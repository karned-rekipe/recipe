[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rekipe-sample"
version = "0.1.0"
description = "Sample CRUD — built on arclith"
requires-python = ">=3.13"
dependencies = [
    "arclith[mongodb,fastapi,mcp]>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = [
    "domain",
    "adapters",
    "application",
    "infrastructure",
]

